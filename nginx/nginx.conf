worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Upstream
    upstream bikehaus_api {
        server bikehaus:5000;
    }

    # SSL settings (shared)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ═══════════════════════════════════════════════════════════════
    # HTTP → HTTPS REDIRECTS
    # ═══════════════════════════════════════════════════════════════

    # Redirect all HTTP to HTTPS (except Let's Encrypt challenge)
    server {
        listen 80;
        server_name bikehausfreiburg.com www.bikehausfreiburg.com admin.bikehausfreiburg.com api.bikehausfreiburg.com;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/lib/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: PUBLIC HOMEPAGE (bikehausfreiburg.com)
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name bikehausfreiburg.com www.bikehausfreiburg.com;

        ssl_certificate /etc/letsencrypt/live/bikehausfreiburg.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bikehausfreiburg.com/privkey.pem;

        # Serve public homepage static files
        root /usr/share/nginx/html/homepage;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html/homepage;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: ADMIN PANEL (admin.bikehausfreiburg.com)
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name admin.bikehausfreiburg.com;

        ssl_certificate /etc/letsencrypt/live/bikehausfreiburg.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bikehausfreiburg.com/privkey.pem;

        # API reverse proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://bikehaus_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }

        # Angular Admin SPA - serve from API's wwwroot
        location / {
            proxy_pass http://bikehaus_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: API (api.bikehausfreiburg.com)
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name api.bikehausfreiburg.com;

        ssl_certificate /etc/letsencrypt/live/bikehausfreiburg.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bikehausfreiburg.com/privkey.pem;

        # All API requests
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://bikehaus_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }

        # CORS is handled by the .NET API middleware — do NOT add duplicate headers here
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ═══════════════════════════════════════════════════════════════
    # FALLBACK: Catch-all for IP/unknown hosts
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/lib/letsencrypt;
        }

        location / {
            return 301 https://bikehausfreiburg.com$request_uri;
        }
    }
}
