services:
  bikehaus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bikehaus-app
    restart: unless-stopped
    ports:
      - '5000:5000'
    volumes:
      - bikehaus-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_SECRET_KEY:-BikeHausFreiburgProductionKey2024SuperSecret!@#}
      - PLAYWRIGHT_BROWSERS_PATH=/app/.playwright
    networks:
      - bikehaus-network

  nginx:
    image: nginx:alpine
    container_name: bikehaus-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - ./homepage-dist:/usr/share/nginx/html/homepage:ro
    depends_on:
      - bikehaus
    networks:
      - bikehaus-network

  # Certbot for Let's Encrypt SSL
  certbot:
    image: certbot/certbot
    container_name: bikehaus-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  bikehaus-data:
    driver: local
  certbot-etc:
    driver: local
  certbot-var:
    driver: local

networks:
  bikehaus-network:
    driver: bridge
